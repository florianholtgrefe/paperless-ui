server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # CSP — blocks XSS script injection
    # style-src needs unsafe-inline because Svelte sets inline tag colors
    # frame-src needs blob: for the PDF iframe (blob URL)
    # img-src needs blob: for thumbnail blob URLs
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
        always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API + share links to paperless-ngx on internal Docker network
    location /api/ {
        proxy_pass http://paperless-ngx:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /share/ {
        proxy_pass http://paperless-ngx:8000/share/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SvelteKit SPA — all unknown routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
